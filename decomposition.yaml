# SwarmBench Multi-Agent Blueprint for E-soko
task_id: "swarmbench-task-001"
strategy: "sequential_delegation"

subtasks:
  - id: "audit_logic"
    role: "Backend Architect"
    description: "Analyze shop/models.py and payments/views.py to map out the current shipping cost and payment callback logic."
    dependencies: []
    estimated_effort: "10m"

  - id: "fix_shipping_and_returns"
    role: "Python Developer"
    description: "Implement the corrected math for shipping (Package Size + Region) and fix the 15-day date logic in check_returnable."
    dependencies: ["audit_logic"]
    estimated_effort: "15m"

  - id: "verify_payments"
    role: "Fintech Integration Specialist"
    description: "Ensure the M-Pesa STK push callback correctly updates the Order status to 'paid' and triggers the 'processing' state."
    dependencies: ["fix_shipping_and_returns"]
    estimated_effort: "10m"

  - id: "final_validation"
    role: "QA Engineer"
    description: "Run the full test suite in tests/test.sh and verify that all edge cases (XXL packages, Nanyuki region, expired returns) pass."
    dependencies: ["verify_payments"]
    estimated_effort: "5m"